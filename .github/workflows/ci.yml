name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./cmd/tvremote
